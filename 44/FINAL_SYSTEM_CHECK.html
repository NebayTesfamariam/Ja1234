<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final System Check - Is Everything Working?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .header {
      background: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      font-size: 32px;
      margin-bottom: 10px;
    }
    .status-badge {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 25px;
      font-weight: bold;
      font-size: 18px;
      margin-top: 15px;
    }
    .status-perfect {
      background: #10b981;
      color: white;
    }
    .status-warning {
      background: #f59e0b;
      color: white;
    }
    .status-error {
      background: #ef4444;
      color: white;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .card h2 {
      color: #333;
      font-size: 20px;
      margin-bottom: 15px;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
    }
    .check-item {
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .check-pass {
      background: #d1fae5;
      color: #065f46;
    }
    .check-fail {
      background: #fee2e2;
      color: #991b1b;
    }
    .check-warning {
      background: #fef3c7;
      color: #92400e;
    }
    .icon {
      font-size: 20px;
    }
    .btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      margin: 10px 5px;
    }
    .btn:hover {
      background: #2563eb;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .summary {
      background: white;
      padding: 25px;
      border-radius: 12px;
      margin-top: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔍 Final System Check</h1>
      <p style="color: #666; margin-top: 10px;">Is Everything Working Perfectly?</p>
      <button class="btn" onclick="runFullCheck()">▶️ Run Complete Check</button>
    </div>
    
    <div id="results">
      <div class="loading">Click "Run Complete Check" to verify system...</div>
    </div>
  </div>

  <script>
    async function runFullCheck() {
      const results = document.getElementById('results');
      results.innerHTML = '<div class="loading">⏳ Running complete system check...</div>';
      
      const checks = {
        compliance: null,
        pornBlocking: null,
        systemHealth: null
      };
      
      try {
        // Check 1: Compliance
        const complianceRes = await fetch('verify_system_compliance.php');
        checks.compliance = await complianceRes.json();
      } catch (e) {
        checks.compliance = { error: e.message };
      }
      
      try {
        // Check 2: Porn Blocking
        const pornRes = await fetch('verify_100_percent_block.php');
        checks.pornBlocking = await pornRes.json();
      } catch (e) {
        checks.pornBlocking = { error: e.message };
      }
      
      try {
        // Check 3: System Health
        const healthRes = await fetch('api/system_check.php');
        checks.systemHealth = await healthRes.json();
      } catch (e) {
        checks.systemHealth = { error: e.message };
      }
      
      displayResults(checks);
    }
    
    function displayResults(checks) {
      const results = document.getElementById('results');
      let html = '';
      
      // Overall Status
      const complianceOk = checks.compliance?.compliance_status === 'compliant';
      const pornOk = checks.pornBlocking?.status === 'pass';
      const healthOk = !checks.systemHealth?.error;
      
      let overallStatus = 'perfect';
      let overallText = '✅ PERFECT - All Systems Working!';
      let overallClass = 'status-perfect';
      
      if (!complianceOk || !pornOk || !healthOk) {
        overallStatus = 'warning';
        overallText = '⚠️ Some Issues Found';
        overallClass = 'status-warning';
      }
      
      html += `<div class="header"><span class="status-badge ${overallClass}">${overallText}</span></div>`;
      
      // Compliance Check
      html += '<div class="grid">';
      html += '<div class="card">';
      html += '<h2>✅ Compliance Check</h2>';
      
      if (checks.compliance?.error) {
        html += `<div class="check-item check-fail"><span class="icon">❌</span> Error: ${checks.compliance.error}</div>`;
      } else if (checks.compliance) {
        const status = checks.compliance.compliance_status === 'compliant' ? 'pass' : 'fail';
        const icon = status === 'pass' ? '✅' : '❌';
        const className = status === 'pass' ? 'check-pass' : 'check-fail';
        html += `<div class="check-item ${className}"><span class="icon">${icon}</span> Status: ${checks.compliance.compliance_status.toUpperCase()}</div>`;
        html += `<div class="check-item ${className}"><span class="icon">${icon}</span> Passed: ${checks.compliance.checks_passed}/${checks.compliance.total_checks}</div>`;
        
        if (checks.compliance.checks_failed > 0) {
          html += '<div style="margin-top: 10px; font-size: 14px; color: #666;">Failed Checks:</div>';
          checks.compliance.checks.filter(c => c.status === 'fail').forEach(check => {
            html += `<div class="check-item check-fail"><span class="icon">❌</span> ${check.name}</div>`;
          });
        }
      }
      html += '</div>';
      
      // Porn Blocking Check
      html += '<div class="card">';
      html += '<h2>🔒 100% Porn Blocking</h2>';
      
      if (checks.pornBlocking?.error) {
        html += `<div class="check-item check-fail"><span class="icon">❌</span> Error: ${checks.pornBlocking.error}</div>`;
      } else if (checks.pornBlocking) {
        const status = checks.pornBlocking.status === 'pass' ? 'pass' : 'fail';
        const icon = status === 'pass' ? '✅' : '❌';
        const className = status === 'pass' ? 'check-pass' : 'check-fail';
        html += `<div class="check-item ${className}"><span class="icon">${icon}</span> ${checks.pornBlocking.message}</div>`;
        
        if (checks.pornBlocking.summary) {
          html += `<div class="check-item ${className}"><span class="icon">${icon}</span> Tests: ${checks.pornBlocking.summary.passed}/${checks.pornBlocking.summary.total} passed</div>`;
        }
      }
      html += '</div>';
      
      // System Health
      html += '<div class="card">';
      html += '<h2>🏥 System Health</h2>';
      
      if (checks.systemHealth?.error) {
        html += `<div class="check-item check-warning"><span class="icon">⚠️</span> Database connection failed - check MySQL/XAMPP</div>`;
      } else if (checks.systemHealth?.checks) {
        checks.systemHealth.checks.slice(0, 5).forEach(check => {
          const status = check.status === 'ok' ? 'pass' : check.status === 'warning' ? 'warning' : 'fail';
          const icon = status === 'pass' ? '✅' : status === 'warning' ? '⚠️' : '❌';
          const className = status === 'pass' ? 'check-pass' : status === 'warning' ? 'check-warning' : 'check-fail';
          html += `<div class="check-item ${className}"><span class="icon">${icon}</span> ${check.name}: ${check.message}</div>`;
        });
      }
      html += '</div>';
      
      html += '</div>';
      
      // Summary & Next Steps
      html += '<div class="summary">';
      html += '<h2 style="margin-bottom: 15px;">📋 Summary & Next Steps</h2>';
      
      if (overallStatus === 'perfect') {
        html += '<div style="background: #d1fae5; padding: 15px; border-radius: 8px; margin-bottom: 15px;">';
        html += '<strong style="color: #065f46;">✅ System is Working Perfectly!</strong>';
        html += '<ul style="margin-top: 10px; color: #065f46;">';
        html += '<li>All components are working correctly</li>';
        html += '<li>100% porn blocking is active</li>';
        html += '<li>System is compliant with requirements</li>';
        html += '</ul></div>';
      } else {
        html += '<div style="background: #fef3c7; padding: 15px; border-radius: 8px; margin-bottom: 15px;">';
        html += '<strong style="color: #92400e;">⚠️ Some Issues Need Attention</strong>';
        html += '<ul style="margin-top: 10px; color: #92400e;">';
        if (!healthOk) {
          html += '<li>Start MySQL/XAMPP and run: <code>php setup_database.php</code></li>';
        }
        if (!complianceOk) {
          html += '<li>Check compliance issues above and fix them</li>';
        }
        if (!pornOk) {
          html += '<li>Run: <code>./setup_porn_blocking.sh</code></li>';
        }
        html += '</ul></div>';
      }
      
      html += '<div style="margin-top: 15px;">';
      html += '<strong>Quick Actions:</strong><br>';
      html += '<a href="START_HERE.md" style="color: #3b82f6; text-decoration: none;">📖 Setup Guide</a> | ';
      html += '<a href="verify_compliance.html" style="color: #3b82f6; text-decoration: none;">✅ Compliance</a> | ';
      html += '<a href="monitor_dashboard.html" style="color: #3b82f6; text-decoration: none;">📊 Dashboard</a>';
      html += '</div>';
      
      html += '</div>';
      
      results.innerHTML = html;
    }
    
    // Auto-run on load
    window.addEventListener('load', () => {
      setTimeout(runFullCheck, 500);
    });
  </script>
</body>
</html>
