<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Monitoring Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }
    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
    }
    .header {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 { color: #f1f5f9; font-size: 24px; }
    .refresh-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    .refresh-btn:hover { background: #2563eb; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #334155;
    }
    .card h2 {
      color: #f1f5f9;
      font-size: 18px;
      margin-bottom: 15px;
      border-bottom: 2px solid #334155;
      padding-bottom: 10px;
    }
    .metric {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #334155;
    }
    .metric:last-child { border-bottom: none; }
    .metric-label { color: #94a3b8; }
    .metric-value {
      color: #f1f5f9;
      font-weight: bold;
    }
    .status-ok { color: #10b981; }
    .status-warning { color: #f59e0b; }
    .status-error { color: #ef4444; }
    .loading {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
    }
    .chart-container {
      height: 200px;
      background: #0f172a;
      border-radius: 8px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <h1>📊 System Monitoring Dashboard</h1>
      <button class="refresh-btn" onclick="loadDashboard()">🔄 Refresh</button>
    </div>
    
    <div id="dashboard-content" class="loading">
      Loading dashboard...
    </div>
  </div>

  <script>
    let refreshInterval;
    
    async function loadDashboard() {
      const content = document.getElementById('dashboard-content');
      content.innerHTML = '<div class="loading">Loading...</div>';
      
      try {
        const response = await fetch('api/monitor_dashboard.php');
        const data = await response.json();
        
        if (data.error) {
          content.innerHTML = `<div class="card"><p style="color: #ef4444;">Error: ${data.error}</p></div>`;
          return;
        }
        
        displayDashboard(data);
        
        // Auto-refresh every 30 seconds
        clearInterval(refreshInterval);
        refreshInterval = setInterval(loadDashboard, 30000);
        
      } catch (e) {
        content.innerHTML = `<div class="card"><p style="color: #ef4444;">Error: ${e.message}</p></div>`;
      }
    }
    
    function displayDashboard(data) {
      const content = document.getElementById('dashboard-content');
      let html = '<div class="grid">';
      
      // System Metrics
      html += '<div class="card">';
      html += '<h2>🖥️ System</h2>';
      html += `<div class="metric"><span class="metric-label">PHP Version</span><span class="metric-value">${data.system.php_version}</span></div>`;
      html += `<div class="metric"><span class="metric-label">Server Time</span><span class="metric-value">${data.system.server_time}</span></div>`;
      html += `<div class="metric"><span class="metric-label">Memory Usage</span><span class="metric-value">${formatBytes(data.system.memory_usage.current)}</span></div>`;
      html += `<div class="metric"><span class="metric-label">Disk Usage</span><span class="metric-value status-${data.system.disk_usage.percent_used > 90 ? 'warning' : 'ok'}">${data.system.disk_usage.percent_used}%</span></div>`;
      html += '</div>';
      
      // Device Metrics
      html += '<div class="card">';
      html += '<h2>📱 Devices</h2>';
      html += `<div class="metric"><span class="metric-label">Total</span><span class="metric-value">${data.devices.total}</span></div>`;
      html += `<div class="metric"><span class="metric-label">Active</span><span class="metric-value status-ok">${data.devices.active}</span></div>`;
      html += `<div class="metric"><span class="metric-label">Inactive</span><span class="metric-value">${data.devices.inactive}</span></div>`;
      html += `<div class="metric"><span class="metric-label">Admin Created</span><span class="metric-value">${data.devices.admin_created}</span></div>`;
      html += `<div class="metric"><span class="metric-label">Auto Created</span><span class="metric-value">${data.devices.auto_created}</span></div>`;
      html += '</div>';
      
      // DNS Metrics
      html += '<div class="card">';
      html += '<h2>🌐 DNS Server</h2>';
      const dnsStatus = data.dns.server_status === 'running' ? 'ok' : 'error';
      html += `<div class="metric"><span class="metric-label">Status</span><span class="metric-value status-${dnsStatus}">${data.dns.server_status}</span></div>`;
      html += `<div class="metric"><span class="metric-label">Queries (1h)</span><span class="metric-value">${data.dns.queries_last_hour}</span></div>`;
      html += `<div class="metric"><span class="metric-label">Blocked (1h)</span><span class="metric-value">${data.dns.blocked_queries}</span></div>`;
      html += '</div>';
      
      // Security Metrics
      html += '<div class="card">';
      html += '<h2>🔒 Security</h2>';
      html += `<div class="metric"><span class="metric-label">Logins (24h)</span><span class="metric-value">${data.security.logins_24h}</span></div>`;
      html += `<div class="metric"><span class="metric-label">Failed Logins</span><span class="metric-value status-${data.security.failed_logins > 10 ? 'warning' : 'ok'}">${data.security.failed_logins}</span></div>`;
      html += `<div class="metric"><span class="metric-label">Rate Limit Blocks</span><span class="metric-value">${data.security.rate_limit_blocks}</span></div>`;
      html += '</div>';
      
      // Subscription Metrics
      html += '<div class="card">';
      html += '<h2>💳 Subscriptions</h2>';
      html += `<div class="metric"><span class="metric-label">Total</span><span class="metric-value">${data.subscriptions.total}</span></div>`;
      html += `<div class="metric"><span class="metric-label">Active</span><span class="metric-value status-ok">${data.subscriptions.active}</span></div>`;
      html += `<div class="metric"><span class="metric-label">Expired</span><span class="metric-value status-warning">${data.subscriptions.expired}</span></div>`;
      html += '</div>';
      
      // Whitelist Metrics
      html += '<div class="card">';
      html += '<h2>✅ Whitelist</h2>';
      html += `<div class="metric"><span class="metric-label">Devices with Whitelist</span><span class="metric-value">${data.whitelist.devices_with_whitelist}</span></div>`;
      html += `<div class="metric"><span class="metric-label">Total Domains</span><span class="metric-value">${data.whitelist.total_domains}</span></div>`;
      html += `<div class="metric"><span class="metric-label">Avg per Device</span><span class="metric-value">${data.whitelist.avg_domains_per_device}</span></div>`;
      html += '</div>';
      
      html += '</div>';
      
      // Performance Section
      html += '<div class="card" style="margin-top: 20px;">';
      html += '<h2>⚡ Performance</h2>';
      html += '<div class="chart-container">Performance charts coming soon...</div>';
      html += '</div>';
      
      content.innerHTML = html;
    }
    
    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
    }
    
    // Load on page load
    loadDashboard();
  </script>
</body>
</html>
