# CoreDNS Configuration for Whitelist-Only DNS
# This configuration uses the forward plugin to forward to our Python DNS server
# Or you can use the http plugin to call the API directly

.:53 {
    # Log all queries
    log
    
    # Forward to our Python DNS whitelist server (running on port 5353)
    # The Python server handles the whitelist logic
    forward . 127.0.0.1:5353 {
        except .
    }
    
    # Or use the http plugin to call API directly (more complex, requires custom plugin)
    # http://localhost/44/api/get_whitelist.php?device_id=X
}

# Alternative: Use Unbound with Python script
# See dns_whitelist_server.py for the actual implementation
