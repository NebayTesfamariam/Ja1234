# DNS SafeSearch Configuration
# For use with dnsmasq, BIND, or other DNS servers
# This forces SafeSearch on all search engines

# ============================================
# Google SafeSearch Enforcement
# ============================================
# Force all Google domains to use SafeSearch
address=/www.google.com/216.239.38.120
address=/www.google.nl/216.239.38.120
address=/www.google.de/216.239.38.120
address=/www.google.fr/216.239.38.120
address=/www.google.co.uk/216.239.38.120
address=/www.google.es/216.239.38.120
address=/www.google.it/216.239.38.120
address=/www.google.be/216.239.38.120
address=/images.google.com/216.239.38.120
address=/images.google.nl/216.239.38.120

# Google SafeSearch IP addresses (force SafeSearch)
# These IPs always return SafeSearch results
216.239.38.120 forcesafesearch.google.com

# ============================================
# Bing SafeSearch Enforcement
# ============================================
address=/www.bing.com/204.79.197.220
address=/www.bing.nl/204.79.197.220
address=/www.bing.de/204.79.197.220

# Bing SafeSearch IP (strict mode)
204.79.197.220 strict.bing.com

# ============================================
# YouTube Restricted Mode Enforcement
# ============================================
address=/youtube.com/216.58.208.46
address=/www.youtube.com/216.58.208.46
address=/m.youtube.com/216.58.208.46
address=/youtu.be/216.58.208.46

# YouTube Restricted Mode IP
216.58.208.46 restrict.youtube.com

# ============================================
# DuckDuckGo SafeSearch
# ============================================
address=/duckduckgo.com/40.89.244.232
address=/www.duckduckgo.com/40.89.244.232

# ============================================
# Yandex SafeSearch
# ============================================
address=/yandex.com/87.250.250.242
address=/www.yandex.com/87.250.250.242

# ============================================
# Usage Instructions
# ============================================
# 
# For dnsmasq:
# 1. Copy this file to /etc/dnsmasq.d/safesearch.conf
# 2. Restart dnsmasq: systemctl restart dnsmasq
# 
# For BIND:
# 1. Convert addresses to zone file format
# 2. Add to named.conf.local
# 3. Reload BIND: systemctl reload bind9
# 
# For VPN Server:
# 1. Use DNS resolution function in VPN code
# 2. Override DNS responses for search engines
# 3. Force SafeSearch domains
