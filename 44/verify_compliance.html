<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Compliance Verification</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .header {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
    }
    h1 { color: #f1f5f9; font-size: 28px; margin-bottom: 10px; }
    .status-badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      margin-top: 10px;
    }
    .status-compliant {
      background: #10b981;
      color: white;
    }
    .status-non-compliant {
      background: #ef4444;
      color: white;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: #1e293b;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid #334155;
    }
    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: #f1f5f9;
      margin-bottom: 5px;
    }
    .stat-label {
      color: #94a3b8;
      font-size: 14px;
    }
    .checks {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #334155;
    }
    .check-item {
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      border-left: 4px solid;
    }
    .check-pass {
      background: #064e3b;
      border-color: #10b981;
    }
    .check-fail {
      background: #7f1d1d;
      border-color: #ef4444;
    }
    .check-name {
      font-weight: bold;
      color: #f1f5f9;
      margin-bottom: 5px;
    }
    .check-message {
      color: #cbd5e1;
      font-size: 14px;
    }
    .check-details {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #334155;
      font-size: 12px;
      color: #94a3b8;
    }
    .btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      margin-top: 20px;
    }
    .btn:hover { background: #2563eb; }
    .loading {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔒 System Compliance Verification</h1>
      <p style="color: #94a3b8; margin-top: 10px;">Verifies that the system meets all technical requirements</p>
      <button class="btn" onclick="verifyCompliance()">🔄 Verify Compliance</button>
    </div>
    
    <div id="results">
      <div class="loading">Click "Verify Compliance" to start...</div>
    </div>
  </div>

  <script>
    async function verifyCompliance() {
      const results = document.getElementById('results');
      results.innerHTML = '<div class="loading">Verifying compliance...</div>';
      
      try {
        const response = await fetch('verify_system_compliance.php');
        const data = await response.json();
        
        if (data.error) {
          results.innerHTML = `<div class="check-fail"><div class="check-name">Error</div><div class="check-message">${data.error}</div></div>`;
          return;
        }
        
        displayResults(data);
        
      } catch (e) {
        results.innerHTML = `<div class="check-fail"><div class="check-name">Error</div><div class="check-message">${e.message}</div></div>`;
      }
    }
    
    function displayResults(data) {
      const results = document.getElementById('results');
      let html = '';
      
      // Status Badge
      const statusClass = data.compliance_status === 'compliant' ? 'status-compliant' : 'status-non-compliant';
      const statusText = data.compliance_status === 'compliant' ? '✅ COMPLIANT' : '❌ NON-COMPLIANT';
      
      html += `<div style="text-align: center; margin-bottom: 20px;">`;
      html += `<span class="status-badge ${statusClass}">${statusText}</span>`;
      html += `</div>`;
      
      // Stats
      html += '<div class="stats">';
      html += `<div class="stat-card"><div class="stat-value">${data.checks_passed}</div><div class="stat-label">Passed</div></div>`;
      html += `<div class="stat-card"><div class="stat-value" style="color: #ef4444;">${data.checks_failed}</div><div class="stat-label">Failed</div></div>`;
      html += `<div class="stat-card"><div class="stat-value">${data.total_checks}</div><div class="stat-label">Total Checks</div></div>`;
      html += '</div>';
      
      // Checks
      html += '<div class="checks">';
      html += '<h2 style="color: #f1f5f9; margin-bottom: 15px;">Compliance Checks</h2>';
      
      data.checks.forEach(check => {
        const checkClass = check.status === 'pass' ? 'check-pass' : 'check-fail';
        const icon = check.status === 'pass' ? '✅' : '❌';
        
        html += `<div class="check-item ${checkClass}">`;
        html += `<div class="check-name">${icon} ${check.name}</div>`;
        html += `<div class="check-message">${check.message}</div>`;
        
        if (check.details && Object.keys(check.details).length > 0) {
          html += '<div class="check-details">';
          html += '<strong>Details:</strong> ';
          html += Object.entries(check.details).map(([key, value]) => {
            if (typeof value === 'object') {
              return `${key}: ${JSON.stringify(value)}`;
            }
            return `${key}: ${value}`;
          }).join(', ');
          html += '</div>';
        }
        
        html += '</div>';
      });
      
      html += '</div>';
      
      // Timestamp
      html += `<div style="text-align: center; color: #94a3b8; margin-top: 20px; font-size: 12px;">`;
      html += `Verified at: ${data.timestamp}`;
      html += `</div>`;
      
      results.innerHTML = html;
    }
    
    // Auto-verify on load
    window.addEventListener('load', () => {
      verifyCompliance();
    });
  </script>
</body>
</html>
